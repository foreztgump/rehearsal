# Adept — self-hosted LiveKit server config (Plan 01-03).
#
# Local-first / no-egress design (PERF-03, DEPLOY-02):
#   We set rtc.node_ip (LAN VM IP) with use_external_ip:false rather than
#   use_external_ip:true. use_external_ip:true makes LiveKit reach out to a
#   public STUN server to discover its mapped IP — that is outbound WAN traffic
#   at startup, which violates the "nothing leaves the LAN" invariant the
#   01-03-4 egress check enforces. node_ip pins the ICE host candidate to the
#   LAN-reachable address with zero egress.
#
# node_ip is overridden at runtime by the `--node-ip` flag in docker-compose.yml
# (sourced from LIVEKIT_NODE_IP in .env). The CLI flag takes precedence over this
# file's value, and only works because use_external_ip is false (livekit#4049).
# The value below is the safe local default; the operator sets LIVEKIT_NODE_IP to
# the VM's LAN IP (e.g. 192.168.1.50) so real LAN devices can reach the media.
#
# Keys are NOT stored here — they are injected via the LIVEKIT_KEYS env var
# (built from LIVEKIT_API_KEY/LIVEKIT_API_SECRET in the gitignored .env) so no
# secret is committed.

# Main TCP port: RoomService / RTC signaling (WS + API). Fronted by Caddy TLS
# (proxy :7443 -> livekit-server:7880) for wss:// in Phase 2.
port: 7880

# Room lifecycle: close empty rooms quickly so a re-join always creates a fresh
# room — which re-triggers agent dispatch (JT_ROOM jobs fire on room creation,
# NOT on join into an existing room). The default empty_timeout (300s) leaves a
# stale, agent-less room alive for 5 min after an agent restart, so a re-join
# lands in a "ghost" room with no agent. Short timeouts avoid that in dev.
room:
  empty_timeout: 10
  departure_timeout: 10

rtc:
  # ICE over TCP fallback when UDP is unavailable. Must be reachable on the node.
  tcp_port: 7881
  # UDP mux: ALL client UDP media flows over this single port — one firewall
  # rule instead of a 10k range. port_range_start/end are intentionally OMITTED
  # (setting them disables the mux).
  udp_port: 7882
  # Pin the advertised ICE host candidate to the LAN IP via node_ip (below) — do
  # NOT discover it via STUN (would be WAN egress). Override at runtime with the
  # --node-ip flag from docker-compose.yml.
  use_external_ip: false
  # Advertised ICE host candidate. Defaults to loopback for the local-first,
  # single-box install (browser on the same machine as the stack). Overridden at
  # runtime by --node-ip (LIVEKIT_NODE_IP in .env) for LAN/remote use.
  #
  # FIREFOX CAVEAT: Firefox refuses loopback ICE by default
  # (media.peerconnection.ice.loopback=false) and silently drops a 127.0.0.1
  # candidate, so an on-box Firefox client fails to pair ("could not establish pc
  # connection") against this loopback default. To use Firefox (or any LAN device),
  # set LIVEKIT_NODE_IP to the host's LAN IP in .env, re-mint certs/lan.pem to cover
  # it (certs/README.md), and point LAN_BIND_IP / NEXT_PUBLIC_LIVEKIT_URL at the
  # same IP. Chromium connects fine over loopback with no changes.
  node_ip: 127.0.0.1
  # use_ice_lite left off (default) for the initial single-node homelab deploy.
