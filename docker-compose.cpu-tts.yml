# Rehearsal CPU TTS override — Kokoro-FastAPI CPU image (ONNX-optimized, no GPU).
# Use with explicit -f flags (works on every platform; on Windows the COMPOSE_FILE
# colon separator fails — ':' collides with drive letters):
#   docker compose -f docker-compose.yml -f docker-compose.cpu-tts.yml up -d
#
# Drop-in for the default GPU kokoro: same port 8880, same KOKORO_BASE_URL contract,
# preserves /v1/audio/speech + /dev/captioned_speech (word-timestamped). Used by the
# Windows-AMD profile (alongside docker-compose.windows-amd.yml) and any no-GPU host
# that still wants TTS.
services:
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.5.0
    deploy:
      resources:
        reservations:
          devices: !reset []
