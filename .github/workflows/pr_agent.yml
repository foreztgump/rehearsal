name: pr-agent

# Automated code review on every pull request (review-only). Runs on a stock
# GitHub-hosted runner. The review model, fallback, and API base/key are supplied
# via repo secrets so this public workflow reveals no provider or model details.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:

# Cancel a superseded run on the same PR so a rapid push series doesn't queue up.
concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  pr_agent:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    name: automated code review
    steps:
      - name: PR-Agent
        # Pinned to the 0.38.0 release by digest (no :latest — repo convention).
        uses: docker://pragent/pr-agent@sha256:ea2ea90f072fd97708755e59827a317272f66097a1ef349eca23d39160bb0baf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Model, fallback, context size, and API base/key come from repo secrets so
          # no provider/model details are exposed in this public workflow. The chosen
          # models are large-context; custom_model_max_tokens must match the API base.
          config.model: ${{ secrets.PR_AGENT_MODEL }}
          config.fallback_models: ${{ secrets.PR_AGENT_FALLBACK_MODELS }}
          config.custom_model_max_tokens: ${{ secrets.PR_AGENT_MAX_TOKENS }}
          # Duplicate the in-prompt examples — steadies structured output on open models.
          config.duplicate_examples: "true"
          OPENAI__API_BASE: ${{ secrets.PR_AGENT_API_BASE }}
          OPENAI__KEY: ${{ secrets.PR_AGENT_API_KEY }}
          # --- Review only (no describe / no improve). ---
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "false"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'
