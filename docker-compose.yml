# Adept — single-stack Docker Compose.
# Six services boot from one `docker compose up`; the three model containers
# reserve the GPU; every published port binds to the LAN/host interface only
# (LAN_BIND_IP, default 127.0.0.1) — never 0.0.0.0 / WAN. The browser talks to
# the web shell (http://localhost:3000) and LiveKit (ws://localhost:7880)
# directly: localhost is a secure context, so the mic/WebRTC work over plain
# HTTP with no TLS. To serve other LAN devices over https://<lan-ip> instead,
# see README.md (optional TLS reverse-proxy). Upstream image tags are pinned (no
# :latest); nemo-stt is a locally-built service (./stt), not an upstream image.

services:
  livekit-server:
    image: livekit/livekit-server:v1.10.1
    # Real self-host config (01-03): LAN-correct ICE via udp mux 7882 + node_ip.
    # --config loads livekit.yaml; --node-ip pins the advertised ICE host
    # candidate to the LAN VM IP (LIVEKIT_NODE_IP) with no STUN/WAN egress. Keys
    # come from LIVEKIT_KEYS (built from .env) — never committed in the yaml.
    command: ["--config", "/etc/livekit.yaml", "--node-ip", "${LIVEKIT_NODE_IP:-127.0.0.1}"]
    env_file: .env
    environment:
      # LiveKit reads its API key/secret pair from LIVEKIT_KEYS ("key: secret").
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:7880:7880"
      - "${LAN_BIND_IP:-127.0.0.1}:7881:7881/tcp"
      - "${LAN_BIND_IP:-127.0.0.1}:7882:7882/udp"
    networks:
      - adept
    restart: unless-stopped

  agent:
    # LiveKit agent worker (01-03): uv-installed livekit-agents + plugins with
    # Silero VAD / MultilingualModel turn-detector weights baked at build time.
    # Constructs the AgentSession against the three local model endpoints, runs
    # the startup warmup, emits the one real metric, and registers as a worker.
    build: ./agent
    env_file: .env
    networks:
      - adept
    # depends_on gates the agent on the other services STARTING (Phase 10 change):
    # the Phase-9 `nemo-stt: service_healthy` HARD-GATE is DROPPED to service_started
    # because placement (Wave 2) picks EITHER nemo-stt (gpu) OR nemo-stt-cpu (cpu) per
    # session — forcing the GPU STT healthy would boot/wait on an image a CPU-default
    # deploy never uses. The NemoSTT plugin's WS connect-retry is the readiness point;
    # only the placement-resolved STT service need actually be up (RESEARCH §4).
    # M5: depends_on points at nemo-stt-cpu (the DEFAULT, always-on CPU STT) — NOT the
    # GPU nemo-stt, which is now behind the `stt-gpu` profile (opt-in). Referencing the
    # profiled GPU service here would drag it into the default `up` and re-resident its
    # ~2.4 GB on the GPU, defeating the headroom the placement table banks on. When the
    # operator runs the GPU cell (`--profile stt-gpu`), the GPU STT comes up alongside.
    depends_on:
      livekit-server:
        condition: service_started
      ollama:
        condition: service_started
      nemo-stt-cpu:
        condition: service_started
      kokoro:
        condition: service_started
    restart: unless-stopped

  ollama:
    # Bumped 0.6.8 -> 0.30.10 (Phase 8): 0.6.8's bundled llama.cpp predates the
    # gemma4 architecture merge, so the Fast/Better tags 500'd with
    # `unknown model architecture: 'gemma4'`. Ollama 0.30+ ships gemma4/GGUF
    # support (ollama blog "Improved performance and model support with GGUF").
    # Pinned to an exact stable tag (not :latest / -rc) for reproducibility.
    image: ollama/ollama:0.30.10
    # No env_file (M3): this pure model server needs none of .env's vars — all its
    # config is in the explicit `environment:` block below. Dropping env_file keeps
    # LIVEKIT_API_SECRET (and other secrets) out of a container that never uses them.
    environment:
      # VRAM-budget trio (01-02): flash-attn is REQUIRED for the q8_0 KV cache
      # quant, which ~halves KV memory so STT+LLM+TTS co-reside under 16GB;
      # keep_alive=-1 pins the model resident (no cold reload / KV dump).
      # q8_0 silently falls back to F16 if gemma4 is off Ollama's flash-attn
      # allowlist — scripts/vram-validate.sh verifies engagement empirically.
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      # v1.2 R2 — model lifecycle. MAX_LOADED_MODELS=1 forces SINGLE-RESIDENT: loading
      # the newly-picked model EVICTS the previous one, so a Fast/Better/Floor swap can
      # never double-occupy VRAM (the 6GB-floor invariant). KEEP_ALIVE is now env-driven
      # (default 10m) instead of the old -1 pin, so an idle session frees VRAM; set
      # OLLAMA_KEEP_ALIVE=-1 in .env for lowest-latency-always on a roomy GPU. (D4)
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-10m}
      # Effective context = ctx-size / num_parallel. With num_parallel defaulting
      # to 2, the pinned 8192 was silently HALVED to 4096 per slot, truncating real
      # KB prompts (`truncating input prompt limit=4096` — UAT 04-04 GAP-1). MVP is
      # single-session, so one request slot is correct AND VRAM-neutral: 8192 ctx x
      # 1 slot pre-allocates the SAME total KV as 4096 x 2 slots.
      - OLLAMA_NUM_PARALLEL=1
      # SINGLE SOURCE OF TRUTH for the hot-path context. The agent (`/v1/chat` via
      # with_ollama) and the distiller (`/api/generate`) both load the BASE tag
      # gemma3:4b-it-qat, NOT the `adept-gemma` pinned model, so the Modelfile
      # `num_ctx 8192` never reaches the runtime — this env is what actually pins
      # the effective context to 8192 for every model loaded over either endpoint.
      - OLLAMA_CONTEXT_LENGTH=8192
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - adept
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  nemo-stt:
    # Locally-built Nemotron cache-aware streaming ASR server (./stt) — the Phase 9
    # STT service. The model is loaded RESIDENT at server startup and never
    # offloaded (mirrors the prior STT keep-resident fix that stopped the first-
    # turn-drop cold-reload bug, commit 06920c5). Single-sourced model tag: the default
    # literal lives ONLY here (build.args + environment) — server.py + the
    # Dockerfile body carry it via STT_MODEL env/ARG (no hardcoded tag, AGENTS.md).
    build:
      context: ./stt
      args:
        STT_MODEL: ${STT_MODEL:-nvidia/nemotron-speech-streaming-en-0.6b}
        STT_MODEL_REVISION: ${STT_MODEL_REVISION:-main}
    # M5: opt-in profile so the GPU STT (which loads ~2.4 GB RESIDENT on the GPU,
    # keep-forever) is NOT brought up by the DEFAULT `docker compose up`. The shipped
    # default (STT_FORCE_CPU=1) routes every session to the always-on nemo-stt-cpu, so
    # an always-on GPU STT would silently consume the exact VRAM the placement math
    # assumes CPU-STT frees (STT_GPU_MB=2400). The operator opts into the GPU cell with
    # `docker compose --profile stt-gpu up` (paired with STT_FORCE_CPU=0 +
    # STT_HEADROOM_MEASURED=1 after the co-residency matrix passes — see .env.example).
    profiles: ["stt-gpu"]
    # No env_file (M3): the STT server takes its model/params via build-ARG + env;
    # it needs none of .env — and must not carry the LiveKit secret.
    environment:
      # STT_RUNTIME=gpu is the server default, but set it explicitly here for
      # symmetry with nemo-stt-cpu (STT_RUNTIME=cpu) — this service is the GPU NeMo
      # backend (backend_nemo).
      - STT_RUNTIME=gpu
      - STT_MODEL=${STT_MODEL:-nvidia/nemotron-speech-streaming-en-0.6b}
      # STT_MODEL_REVISION is a BUILD-only arg (snapshot-download pin baked into the
      # image); it is intentionally NOT a runtime env — backend_nemo loads the baked
      # offline cache and never reads it, so a runtime entry would be dead/misleading.
      # Cache-aware Conformer only supports the att_context_size values it was
      # TRAINED on: [[70,13],[70,6],[70,1],[70,0]]. Anything else (e.g. [56,3])
      # runs with an attention context the encoder never saw -> degraded accuracy
      # (drops leading "the", merges words). [70,6] matches a trained setting and
      # benchmarks as accurate as [70,13] but ~4x faster to decode (0.11s vs 0.49s
      # for 4.4s audio). Right-context is the speed/accuracy dial: 13=most lookahead
      # (~1040ms), 6=~480ms, 1=~80ms fastest/least accurate.
      - STT_ATT_CONTEXT_SIZE=${STT_ATT_CONTEXT_SIZE:-[70,6]}
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:8000:8000"
    networks:
      - adept
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Generous start_period — model load is slow. python urllib probe (NOT curl —
    # curl is not guaranteed in the NeMo base image; a missing-curl healthcheck
    # would never pass and the agent would hang forever on service_healthy). SAME
    # command as the Dockerfile HEALTHCHECK (stt/Dockerfile).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      start_period: 180s
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  nemo-stt-cpu:
    # Off-GPU CPU-ONNX STT (Phase 10, STT-05) — the same ./stt codebase as nemo-stt
    # but built from Dockerfile.cpu (python:3.11-slim, onnxruntime CPU EP, no CUDA/
    # NeMo/torch) and routed to backend_onnx via STT_RUNTIME=cpu. ~0.88 GB int8-dynamic
    # default / ~0.67 GB int4-kquant operator stretch (RESEARCH §1.1). Both STT services
    # are defined; only the placement-resolved one (Wave 2) need be healthy per session.
    # M5: this CPU service is ALWAYS-ON (no profile) — it is the shipped default
    # (STT_FORCE_CPU=1) and uses NO VRAM, so the default `docker compose up` brings up
    # ONLY the CPU STT. The GPU nemo-stt is opt-in behind the `stt-gpu` profile.
    # Single-sourced ONNX tag: the default literal lives ONLY here (build.args +
    # environment) — Dockerfile.cpu body + server.py + backend_onnx carry it via
    # STT_ONNX_MODEL env/ARG (no hardcoded tag, AGENTS.md).
    build:
      context: ./stt
      dockerfile: Dockerfile.cpu
      args:
        # STT_MODEL is the SOURCE .nemo the export-builder stage loads via
        # from_pretrained to produce the ONNX bundle (export_onnx.py). It was missing
        # here, so the build's export step ran from_pretrained("") and failed with
        # "Model  was not found". Mirrors the GPU nemo-stt build arg (same default).
        STT_MODEL: ${STT_MODEL:-nvidia/nemotron-speech-streaming-en-0.6b}
        STT_MODEL_REVISION: ${STT_MODEL_REVISION:-main}
        STT_ONNX_MODEL: ${STT_ONNX_MODEL:-nvidia/nemotron-speech-streaming-en-0.6b-onnx}
        STT_QUANT: ${STT_QUANT:-int8-dynamic}
    # No env_file (M3): takes its model/params via build-ARG + env; needs none of .env
    # and must not carry the LiveKit secret.
    environment:
      - STT_RUNTIME=cpu
      - STT_ONNX_MODEL=${STT_ONNX_MODEL:-nvidia/nemotron-speech-streaming-en-0.6b-onnx}
      - STT_QUANT=${STT_QUANT:-int8-dynamic}
    # Distinct HOST port 8001 for host probing (internal stays 8000; the agent reaches
    # it by service DNS ws://nemo-stt-cpu:8000/...). No collision with nemo-stt's 8000.
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:8001:8000"
    networks:
      - adept
    # No GPU reservation — this service runs OFF the GPU (the whole point of the port).
    # SAME python-urllib /health probe as nemo-stt; a SHORTER start_period is fine since
    # ORT load ≪ NeMo load.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  kokoro:
    # CUDA 12.8 build — required for Blackwell (RTX 50-series, sm_120). The
    # v0.2.4 image bundles PyTorch for sm_50..sm_90 only and crashes at startup
    # with "no kernel image is available for execution on the device".
    image: ghcr.io/remsky/kokoro-fastapi-gpu:v0.5.0-cu128
    # 15a Item 3: the one free, zero-latency VRAM knob. Kokoro-82M weights are ~0.33GB;
    # the footprint is almost all CUDA context + PyTorch allocator reserve on cu128.
    # MEASURED on this stack (STACK.md:183): ~954 MiB warmed WITH expandable_segments
    # (down from ~1832 MiB without) — far below the old ~5GB upstream worst-case guess.
    # expandable_segments reclaims reserved fragmentation at no latency cost. See PITFALLS.md C1.
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    # No env_file (M3): the TTS server takes its model/voice per request, so it needs
    # none of .env — and must not carry the LiveKit secret.
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:8880:8880"
    networks:
      - adept
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        # Bake the browser-facing LiveKit WS URL into the client bundle. Defaults
        # to ws://localhost:7880 (direct to livekit-server) for the local install.
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
    env_file: .env
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:3000:3000"
    networks:
      - adept
    restart: unless-stopped

networks:
  adept:
    driver: bridge

volumes:
  ollama-models:
