# Adept — single-stack Docker Compose (Phase 1 walking skeleton).
# Six services boot from one `docker compose up`; the three model containers
# reserve the GPU; every published port binds to the LAN/host interface only
# (LAN_BIND_IP, default 127.0.0.1) — never 0.0.0.0 / WAN. See README.md GPU
# passthrough + certs/README.md TLS procedure. Image tags are pinned (no :latest
# except faster-whisper, which is pinned by digest below).

services:
  livekit-server:
    image: livekit/livekit-server:v1.10.0
    # --dev boots with a built-in devkey/secret so the stack comes up at this
    # boundary; 01-03 replaces this with a real livekit.yaml + ICE config.
    command: ["--dev", "--bind", "0.0.0.0"]
    env_file: .env
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:7880:7880"
      - "${LAN_BIND_IP:-127.0.0.1}:7881:7881/tcp"
      - "${LAN_BIND_IP:-127.0.0.1}:7882:7882/udp"
    networks:
      - adept
    restart: unless-stopped

  agent:
    # Minimal uv-based placeholder image (01-03 extends it with livekit-agents
    # deps + turn-detector/VAD weights bake). Idles cleanly so the stack stays up.
    build: ./agent
    env_file: .env
    networks:
      - adept
    depends_on:
      - livekit-server
      - ollama
      - whisper
      - kokoro
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.6.8
    env_file: .env
    environment:
      # VRAM-budget trio (01-02): flash-attn is REQUIRED for the q8_0 KV cache
      # quant, which ~halves KV memory so STT+LLM+TTS co-reside under 16GB;
      # keep_alive=-1 pins the model resident (no cold reload / KV dump).
      # q8_0 silently falls back to F16 if gemma4 is off Ollama's flash-attn
      # allowlist — scripts/vram-validate.sh verifies engagement empirically.
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_KEEP_ALIVE=-1
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - adept
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  whisper:
    # Pinned by digest — fedirz/faster-whisper-server:latest-cuda as of 2026-06-25.
    image: fedirz/faster-whisper-server@sha256:0b64050ad0b9244745746b652473ee42a8d5454d501877a252c3e65f631ffc99
    env_file: .env
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:8000:8000"
    networks:
      - adept
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:v0.2.4
    env_file: .env
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:8880:8880"
    networks:
      - adept
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  web:
    build: ./web
    env_file: .env
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:3000:3000"
    networks:
      - adept
    restart: unless-stopped

  proxy:
    # mkcert-trusted TLS termination on 443 → web:3000, plus a TLS vhost passing
    # through the LiveKit WS endpoint (livekit-server:7880) so wss:// works in
    # Phase 2. Certs are mounted read-only from ./certs (see certs/README.md).
    image: caddy:2.8
    env_file: .env
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:443:443"
      - "${LAN_BIND_IP:-127.0.0.1}:7443:7443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
    networks:
      - adept
    depends_on:
      - web
      - livekit-server
    restart: unless-stopped

networks:
  adept:
    driver: bridge

volumes:
  ollama-models:
