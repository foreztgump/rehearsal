name: rehearsal

# Rehearsal — single-stack Docker Compose.
# Six services boot from one `docker compose up`; the three model containers
# reserve the GPU. Published ports bind to the host interface only — never
# 0.0.0.0 / WAN — via TWO knobs (F18):
#   - LAN_BIND_IP  (default 127.0.0.1): the app services (Ollama, STT, Kokoro,
#     web, LiveKit WS signaling). Keep these on loopback even for LAN serving —
#     they are unauthenticated and the TLS proxy reaches them over the internal
#     docker network, so they never need a LAN host bind.
#   - PROXY_BIND_IP (default = LAN_BIND_IP): ONLY the LiveKit WebRTC media ports
#     here (7881/tcp, 7882/udp) + the proxy's 443/7443 in docker-compose.proxy.yml.
#     Media flows browser->host directly (bypassing the proxy), so for LAN serving
#     set PROXY_BIND_IP to the host LAN IP while app services stay loopback.
# The browser talks to the web shell (http://localhost:3000) and LiveKit
# (ws://localhost:7880) directly for a local install: localhost is a secure
# context, so the mic/WebRTC work over plain HTTP with no TLS. To serve other LAN
# devices over https://<lan-ip> instead, see docs/lan-exposure.md (optional TLS
# reverse-proxy). Upstream image tags are pinned (no :latest); nemo-stt is a
# locally-built service (./stt), not an upstream image.

services:
  livekit-server:
    image: livekit/livekit-server:v1.10.1
    # Real self-host config (01-03): LAN-correct ICE via udp mux 7882 + node_ip.
    # --config loads livekit.yaml; --node-ip pins the advertised ICE host
    # candidate to the LAN VM IP (LIVEKIT_NODE_IP) with no STUN/WAN egress. Keys
    # come from LIVEKIT_KEYS (built from .env) — never committed in the yaml.
    command: ["--config", "/etc/livekit.yaml", "--node-ip", "${LIVEKIT_NODE_IP:-127.0.0.1}"]
    env_file: .env
    environment:
      # LiveKit reads its API key/secret pair from LIVEKIT_KEYS ("key: secret").
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      # 7880 is plain-WS signaling: loopback for a local install; for LAN the
      # proxy fronts it as wss on 7443, so it never needs a LAN bind (F18).
      - "${LAN_BIND_IP:-127.0.0.1}:7880:7880"
      # WebRTC MEDIA (audio) flows direct to these, browser -> host, bypassing the
      # TLS proxy — so they must reach the LAN when serving other devices. They
      # bind PROXY_BIND_IP (defaults to LAN_BIND_IP=127.0.0.1 for local installs).
      - "${PROXY_BIND_IP:-${LAN_BIND_IP:-127.0.0.1}}:7881:7881/tcp"
      - "${PROXY_BIND_IP:-${LAN_BIND_IP:-127.0.0.1}}:7882:7882/udp"
    networks:
      - rehearsal
    restart: unless-stopped

  agent:
    # LiveKit agent worker (01-03): uv-installed livekit-agents + plugins with
    # Silero VAD / MultilingualModel turn-detector weights baked at build time.
    # Constructs the AgentSession against the three local model endpoints, runs
    # the startup warmup, emits the one real metric, and registers as a worker.
    build: ./agent
    env_file: .env
    # The agent worker registers with the local LiveKit server over the internal
    # compose network. livekit-agents reads LIVEKIT_URL (API key/secret come from
    # .env); without it the worker aborts with "ws_url is required, or set
    # LIVEKIT_URL". The browser uses NEXT_PUBLIC_LIVEKIT_URL (ws://localhost:7880);
    # the agent must use the in-network service DNS name instead of localhost.
    environment:
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://livekit-server:7880}
    # STT_ENGINE already reaches the agent via env_file; this label exposes the active
    # engine config to `docker inspect` without grepping the container environment.
    labels:
      - "com.rehearsal.stt_engine=${STT_ENGINE:-buffered}"
    networks:
      - rehearsal
    # depends_on gates the agent on the other services STARTING (Phase 10 change):
    # the Phase-9 `nemo-stt: service_healthy` HARD-GATE is DROPPED to service_started
    # because placement (Wave 2) picks EITHER nemo-stt (gpu) OR nemo-stt-cpu (cpu) per
    # session — forcing the GPU STT healthy would boot/wait on an image a CPU-default
    # deploy never uses. The NemoSTT plugin's WS connect-retry is the readiness point;
    # only the placement-resolved STT service need actually be up (RESEARCH §4).
    # M5: depends_on points at nemo-stt-cpu (the DEFAULT, always-on CPU STT) — NOT the
    # GPU nemo-stt, which is now behind the `stt-gpu` profile (opt-in). Referencing the
    # profiled GPU service here would drag it into the default `up` and re-resident its
    # ~3.2 GB on the GPU, defeating the headroom the placement table banks on. When the
    # operator runs the GPU cell (`--profile stt-gpu`), the GPU STT comes up alongside.
    depends_on:
      livekit-server:
        condition: service_started
      ollama:
        condition: service_started
      nemo-stt-cpu:
        condition: service_started
      kokoro:
        condition: service_started
      # Opt-in expressive-voice engine — gated on START only (same relaxed condition as
      # kokoro): the agent defaults to Kokoro and only reaches Chatterbox once the browser
      # flips tts.update, so a slow/absent chatterbox never blocks the default voice path.
      chatterbox:
        condition: service_started
    restart: unless-stopped

  ollama:
    # Bumped 0.6.8 -> 0.30.10 (Phase 8): 0.6.8's bundled llama.cpp predates the
    # gemma4 architecture merge, so the Fast/Better tags 500'd with
    # `unknown model architecture: 'gemma4'`. Ollama 0.30+ ships gemma4/GGUF
    # support (ollama blog "Improved performance and model support with GGUF").
    # Pinned to an exact stable tag (not :latest / -rc) for reproducibility.
    # 0.30.10 -> 0.30.11 (patch bump): re-run scripts/vram-validate.sh after this
    # to reconfirm q8_0 KV + flash-attn still engage for gemma4 under the new engine.
    image: ollama/ollama:0.30.11
    # No env_file (M3): this pure model server needs none of .env's vars — all its
    # config is in the explicit `environment:` block below. Dropping env_file keeps
    # LIVEKIT_API_SECRET (and other secrets) out of a container that never uses them.
    environment:
      # VRAM-budget trio (01-02): flash-attn is REQUIRED for the q8_0 KV cache
      # quant, which ~halves KV memory so STT+LLM+TTS co-reside under 16GB;
      # keep_alive defaults to -1 (always-resident, P50-safe) and OLLAMA_MAX_LOADED_MODELS=1
      # keeps a single model resident — both env-tunable (see OLLAMA_KEEP_ALIVE below) (v1.2 R2).
      # q8_0 silently falls back to F16 if gemma4 is off Ollama's flash-attn
      # allowlist — scripts/vram-validate.sh verifies engagement empirically.
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      # v1.2 R2 — model lifecycle. MAX_LOADED_MODELS=1 forces SINGLE-RESIDENT: loading the
      # newly-picked model EVICTS the previous one, so a Fast/Better/Floor swap can never
      # double-occupy VRAM (the 6GB-floor invariant). That alone caps residency at one, so
      # KEEP_ALIVE defaults to -1 (always-resident) to protect the voice-to-voice P50<1.0s
      # metric — a finite idle-unload would only re-introduce a cold reload on the next
      # utterance, with no VRAM gain. Both env-tunable: OLLAMA_MAX_LOADED_MODELS=2 on a
      # roomy GPU = warm Fast<->Better swaps; OLLAMA_KEEP_ALIVE=10m frees idle VRAM. (D4)
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:--1}
      # Effective context = ctx-size / num_parallel. With num_parallel defaulting
      # to 2, the pinned 8192 was silently HALVED to 4096 per slot, truncating real
      # KB prompts (`truncating input prompt limit=4096` — UAT 04-04 GAP-1). MVP is
      # single-session, so one request slot is correct AND VRAM-neutral: 8192 ctx x
      # 1 slot pre-allocates the SAME total KV as 4096 x 2 slots.
      - OLLAMA_NUM_PARALLEL=1
      # SINGLE SOURCE OF TRUTH for the hot-path context. The agent (`/v1/chat` via
      # with_ollama) and the distiller (`/api/generate`) load the RESOLVED response
      # tags (OLLAMA_MODEL_FAST / _BETTER / _FLOOR, pinned by ollama/pull-and-pin.sh),
      # NOT a `rehearsal-gemma` Modelfile build, so the Modelfile `num_ctx 8192` never
      # reaches the runtime — this env is what actually pins the effective context to
      # 8192 for every model loaded over either endpoint.
      - OLLAMA_CONTEXT_LENGTH=8192
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - rehearsal
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  nemo-stt:
    # Locally-built GPU STT server (./stt). The default model is non-streaming
    # Parakeet (`nvidia/parakeet-tdt-0.6b-v2`) for buffered, accurate finals. The
    # legacy Nemotron streaming path remains available only with explicit env.
    # The model is loaded RESIDENT at server startup and never
    # offloaded (mirrors the prior STT keep-resident fix that stopped the first-
    # turn-drop cold-reload bug, commit 06920c5). Single-sourced model tag: the default
    # literal lives ONLY here (build.args + environment) — server.py + the
    # Dockerfile body carry it via STT_MODEL env/ARG (no hardcoded tag, AGENTS.md).
    build:
      context: ./stt
      args:
        STT_MODEL: ${STT_MODEL:-nvidia/parakeet-tdt-0.6b-v2}
        STT_MODEL_REVISION: ${STT_MODEL_REVISION:-main}
    # M5: opt-in profile so the GPU STT (which loads ~3.2 GB RESIDENT on the GPU,
    # keep-forever) is NOT brought up by the DEFAULT `docker compose up`. The shipped
    # default (STT_FORCE_CPU=1) routes every session to the always-on nemo-stt-cpu, so
    # an always-on GPU STT would silently consume the exact VRAM the placement math
    # assumes CPU-STT frees (STT_GPU_MB=3200). The operator opts into the GPU cell with
    # `docker compose --profile stt-gpu up` (paired with STT_FORCE_CPU=0 +
    # STT_HEADROOM_MEASURED=1 after the co-residency matrix passes — see .env.example).
    profiles: ["stt-gpu"]
    # No env_file (M3): the STT server takes its model/params via build-ARG + env;
    # it needs none of .env — and must not carry the LiveKit secret.
    environment:
      # STT_RUNTIME=gpu is the server default, but set it explicitly here for
      # symmetry with nemo-stt-cpu (STT_RUNTIME=cpu).
      - STT_RUNTIME=gpu
      - STT_MODEL=${STT_MODEL:-nvidia/parakeet-tdt-0.6b-v2}
      # STT_MODEL_REVISION is a BUILD-only arg (snapshot-download pin baked into the
      # image); it is intentionally NOT a runtime env — backend_nemo loads the baked
      # offline cache and never reads it, so a runtime entry would be dead/misleading.
      # Cache-aware Conformer only supports the att_context_size values it was
      # TRAINED on: [[70,13],[70,6],[70,1],[70,0]]. Anything else (e.g. [56,3])
      # runs with an attention context the encoder never saw -> degraded accuracy
      # (drops leading "the", merges words). [70,6] matches a trained setting and
      # benchmarks as accurate as [70,13] but ~4x faster to decode (0.11s vs 0.49s
      # for 4.4s audio). Right-context is the speed/accuracy dial: 13=most lookahead
      # (~1040ms), 6=~480ms, 1=~80ms fastest/least accurate.
      - STT_ATT_CONTEXT_SIZE=${STT_ATT_CONTEXT_SIZE:-[70,6]}
      - STT_STREAM_CHUNK_MS=${STT_STREAM_CHUNK_MS:-320}
      - STT_ENDPOINT_SILENCE_MS=${STT_ENDPOINT_SILENCE_MS:-640}
      # R3 engine selector + Parakeet knobs. Default is buffered Parakeet; streaming
      # and hybrid are retained as legacy/manual modes only.
      - STT_ENGINE=${STT_ENGINE:-buffered}
      - STT_BUFFERED_DEVICE=${STT_BUFFERED_DEVICE:-gpu}
      - STT_PARAKEET_MODEL=${STT_PARAKEET_MODEL:-/models/parakeet-tdt-0.6b-v2-onnx-int8}
      - STT_DEBUG_HYBRID=${STT_DEBUG_HYBRID:-0}
      # G8: cap concurrent STT streams (each pins encoder cache + the decode lock). 0 disables.
      - STT_MAX_CONNECTIONS=${STT_MAX_CONNECTIONS:-8}
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:8000:8000"
    networks:
      - rehearsal
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Generous start_period — model load is slow. python urllib probe (NOT curl —
    # curl is not guaranteed in the NeMo base image; a missing-curl healthcheck
    # would never pass and the agent would hang forever on service_healthy). SAME
    # command as the Dockerfile HEALTHCHECK (stt/Dockerfile).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      start_period: 180s
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  nemo-stt-cpu:
    # Off-GPU CPU STT — the same ./stt codebase as nemo-stt but built from
    # Dockerfile.cpu (python:3.11-slim, sherpa-onnx/onnxruntime CPU, no CUDA/NeMo/torch).
    # Default buffered mode uses the baked Parakeet bundle; backend_onnx remains for
    # legacy streaming. Both STT services
    # are defined; only the placement-resolved one (Wave 2) need be healthy per session.
    # M5: this CPU service is ALWAYS-ON (no profile) — it is the shipped default
    # (STT_FORCE_CPU=1) and uses NO VRAM, so the default `docker compose up` brings up
    # ONLY the CPU STT. The GPU nemo-stt is opt-in behind the `stt-gpu` profile.
    # Single-sourced legacy ONNX tag: the default literal lives ONLY here (build.args +
    # environment) — Dockerfile.cpu body + backend_onnx carry it via STT_ONNX_MODEL
    # env/ARG (no hardcoded tag, AGENTS.md).
    build:
      context: ./stt
      dockerfile: Dockerfile.cpu
      args:
        # STT_ONNX_SOURCE_MODEL is the SOURCE .nemo the legacy streaming export-builder stage loads via
        # from_pretrained to produce the ONNX bundle (export_onnx.py). It was missing
        # here, so the build's export step ran from_pretrained("") and failed with
        # "Model  was not found". Decoupled from STT_MODEL because GPU buffered now
        # uses non-streaming Parakeet as STT_MODEL.
        STT_MODEL: ${STT_ONNX_SOURCE_MODEL:-nvidia/nemotron-speech-streaming-en-0.6b}
        STT_MODEL_REVISION: ${STT_MODEL_REVISION:-main}
        STT_ONNX_MODEL: ${STT_ONNX_MODEL:-nvidia/nemotron-speech-streaming-en-0.6b-onnx}
        STT_QUANT: ${STT_QUANT:-int8-dynamic}
        # O6: the legacy-streaming ONNX export pulls a multi-GB nvcr NeMo image. The
        # shipped default (STT_ENGINE=buffered) uses the sherpa bundle and never needs
        # it, so it is OFF by default; set to 1 only for a CPU STT_ENGINE=streaming build.
        STT_INCLUDE_LEGACY_ONNX: ${STT_INCLUDE_LEGACY_ONNX:-0}
    # No env_file (M3): takes its model/params via build-ARG + env; needs none of .env
    # and must not carry the LiveKit secret.
    environment:
      - STT_RUNTIME=cpu
      - STT_ONNX_MODEL=${STT_ONNX_MODEL:-nvidia/nemotron-speech-streaming-en-0.6b-onnx}
      - STT_QUANT=${STT_QUANT:-int8-dynamic}
      # R3 engine selector + Parakeet ONNX knobs (mirrors nemo-stt above).
      - STT_STREAM_CHUNK_MS=${STT_STREAM_CHUNK_MS:-320}
      - STT_ENDPOINT_SILENCE_MS=${STT_ENDPOINT_SILENCE_MS:-640}
      - STT_ENGINE=${STT_ENGINE:-buffered}
      # Force CPU provider in the CPU service even when .env asks the GPU service to use GPU.
      - STT_BUFFERED_DEVICE=cpu
      - STT_PARAKEET_MODEL=${STT_PARAKEET_MODEL:-/models/parakeet-tdt-0.6b-v2-onnx-int8}
      - STT_DEBUG_HYBRID=${STT_DEBUG_HYBRID:-0}
      # G8: cap concurrent STT streams (each pins encoder cache + the decode lock). 0 disables.
      - STT_MAX_CONNECTIONS=${STT_MAX_CONNECTIONS:-8}
    # Distinct HOST port 8001 for host probing (internal stays 8000; the agent reaches
    # it by service DNS ws://nemo-stt-cpu:8000/...). No collision with nemo-stt's 8000.
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:8001:8000"
    networks:
      - rehearsal
    # No GPU reservation — this service runs OFF the GPU (the whole point of the port).
    # SAME python-urllib /health probe as nemo-stt; a SHORTER start_period is fine since
    # ORT load ≪ NeMo load.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  kokoro:
    # CUDA 12.8 build — required for Blackwell (RTX 50-series, sm_120). The
    # v0.2.4 image bundles PyTorch for sm_50..sm_90 only and crashes at startup
    # with "no kernel image is available for execution on the device".
    image: ghcr.io/remsky/kokoro-fastapi-gpu:v0.5.0-cu128
    # 15a Item 3: the one free, zero-latency VRAM knob. Kokoro-82M weights are ~0.33GB;
    # the footprint is almost all CUDA context + PyTorch allocator reserve on cu128.
    # MEASURED on this stack (STACK.md:183): ~954 MiB warmed WITH expandable_segments
    # (down from ~1832 MiB without) — far below the old ~5GB upstream worst-case guess.
    # expandable_segments reclaims reserved fragmentation at no latency cost. See PITFALLS.md C1.
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    # No env_file (M3): the TTS server takes its model/voice per request, so it needs
    # none of .env — and must not carry the LiveKit secret.
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:8880:8880"
    networks:
      - rehearsal
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  chatterbox:
    # OPT-IN expressive-voice engine (agent/expressive_tts.py): Chatterbox-Turbo adds an
    # `exaggeration` knob so the per-sentence lexicon mood modulates vocal intensity. OFF
    # by default — Kokoro stays the default TTS; the browser flips it live via tts.update.
    # GPU-ONLY (no CPU fallback), ~4.3GB VRAM, and ~0.8-1.2s/sentence so this mode
    # deliberately exceeds the P50<1.0s budget.
    # No upstream published image exists — build the pinned local image from the
    # devnen/Chatterbox-TTS-Server repo's Dockerfile.cu128 (CUDA 12.8, Blackwell/sm_120),
    # then tag it rehearsal-chatterbox:turbo-cu128.
    image: rehearsal-chatterbox:turbo-cu128
    # Same free VRAM knob as kokoro: reclaim allocator fragmentation at no latency cost.
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    # No env_file (M3): the TTS server takes its model/voice/exaggeration per request, so
    # it needs none of .env — and must not carry the LiveKit secret.
    # Persist the ~2GB Turbo weights so a container restart never re-downloads them from
    # Hugging Face (the server fetches on first run into /app/hf_cache).
    volumes:
      - chatterbox-models:/app/hf_cache
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:8004:8004"
    networks:
      - rehearsal
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        # Bake the browser-facing LiveKit WS URL into the client bundle. Defaults
        # to ws://localhost:7880 (direct to livekit-server) for the local install.
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
        # R7: bake the installed model choices + labels so the web picker shows only
        # installed models (one-model install → read-only field). Defaults to the
        # pre-R7 fast/better set for back-compat. Changing these requires a web rebuild.
        NEXT_PUBLIC_REHEARSAL_MODEL_CHOICES: ${REHEARSAL_MODEL_CHOICES:-fast,better}
        NEXT_PUBLIC_REHEARSAL_MODEL_LABELS: ${NEXT_PUBLIC_REHEARSAL_MODEL_LABELS:-Fast,Better}
    env_file: .env
    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:3000:3000"
    networks:
      - rehearsal
    restart: unless-stopped

networks:
  rehearsal:
    driver: bridge

volumes:
  ollama-models:
  chatterbox-models:
