[tool.basedpyright]
include = ["agent", "stt", "tests"]
exclude = ["web", ".planning", "design-mockups", "stt/test_*.py"]
extraPaths = ["agent", "stt"]
pythonVersion = "3.11"
typeCheckingMode = "basic"
reportAttributeAccessIssue = false
reportMissingImports = false
reportMissingTypeStubs = false

[tool.ruff]
line-length = 100
src = ["agent", "stt", "tests"]
target-version = "py311"

[tool.ruff.lint]
select = ["E9", "F821", "F822", "F823"]
